port: 7880
bind_addresses:
  - "127.0.0.1"

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: true

turn:
  enabled: true
  domain: livekit.myconnectify.co
  udp_port: 3478
  # TLS TURN can be added later via nginx stream; UDP TURN is enough for initial QA.
  external_tls: false

redis:
  address: 127.0.0.1:6380

keys:
  API_KEY_PLACEHOLDER: API_SECRET_PLACEHOLDER

logging:
  level: info

room:
  empty_timeout: 60
  departure_timeout: 20
